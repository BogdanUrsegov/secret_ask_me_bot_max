services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./bot:/app/bot
      - sqlite_data:/data
    restart: unless-stopped
    command: python -m bot.main
    user: "root"
      
volumes:
  sqlite_data: